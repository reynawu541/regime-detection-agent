universe:
  benchmark: SPY
  # The 9 "classic" Select Sector SPDRs, all trading since Dec 1998.
  # XLC (Communication Services) and XLRE (Real Estate) are excluded: they
  # launched in 2018 and 2015 respectively, and requiring all sector ETFs to
  # have simultaneous data would truncate cross-sectional features to ~2018+.
  sector_etfs:
    - XLY
    - XLP
    - XLE
    - XLF
    - XLV
    - XLI
    - XLB
    - XLK
    - XLU
  vix_ticker: "^VIX"

history:
  start_date: "2010-01-01"

macro:
  fred_series:
    DGS10: us_10y_yield
    DGS2: us_2y_yield
    BAMLH0A0HYM2: high_yield_spread
  fail_silently: true

features:
  vol_windows: [5, 21, 63]
  dispersion_window: 21
  correlation_window: 63
  correlation_pca_window: 126
  liquidity_window: 21

regimes:
  candidate_n_states: [2, 3, 4]
  min_regime_share: 0.05
  min_state_distinctness: 0.5
  random_state: 42

evaluation:
  known_events:
    - { date: "2020-02-19", label: "COVID crash onset" }
    - { date: "2022-01-01", label: "2022 rate-hike selloff" }

llm:
  provider: anthropic
  model_env_var: ANTHROPIC_MODEL
  default_model: claude-haiku-4-5-20251001
  max_rerun_attempts: 1

paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  reports_dir: reports
  history_log: reports/regime_history.csv
